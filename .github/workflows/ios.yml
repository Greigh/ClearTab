name: iOS CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  core:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.0"

      - name: Run FiHavenCore checks
        working-directory: ios/FiHavenCore
        run: swift run FiHavenCoreChecks
        env:
          # Optional end-to-end checks against a live server. They stay skipped
          # unless an FH_LIVE_TOKEN secret (a token-mode session id) is set; add
          # the secret — and optionally an FH_BASE repo variable — to enable.
          FH_LIVE_TOKEN: ${{ secrets.FH_LIVE_TOKEN }}
          FH_BASE: ${{ vars.FH_BASE }}

  app:
    runs-on: macos-latest
    needs: core

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios/FiHavenApp
        run: xcodegen generate

      - name: Build iOS app
        working-directory: ios/FiHavenApp
        run: xcodebuild -project FiHaven.xcodeproj -scheme FiHaven -destination 'generic/platform=iOS Simulator' build
