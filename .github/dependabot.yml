version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    ignore:
      # Tailwind v4 drops the standalone CLI and the JS-config (`-c`) flag this
      # project's build:css relies on; stay on v3 until a deliberate migration.
      - dependency-name: "tailwindcss"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "gradle"
    directory: "/android"
    schedule:
      interval: "weekly"

  - package-ecosystem: "swift"
    directory: "/ios/FiHavenCore"
    schedule:
      interval: "weekly"