org.gradle.jvmargs=-Xmx2g -Dfile.encoding=UTF-8
org.gradle.caching=true
kotlin.code.style=official
android.useAndroidX=true
android.nonTransitiveRClass=true

# Network resilience for first-time dependency downloads. Gradle's default
# HTTP timeouts are short, so a single slow mirror response during a long
# initial resolution can abort the whole build (the 15-min failure we hit).
# 60s connection/socket timeouts give slow artifacts room to land.
systemProp.org.gradle.internal.http.connectionTimeout=60000
systemProp.org.gradle.internal.http.socketTimeout=60000
android.dependency.useConstraints=false
android.r8.strictFullModeForKeepRules=false
